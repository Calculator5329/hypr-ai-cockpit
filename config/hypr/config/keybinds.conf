source = ~/.config/hypr/config/defaults.conf

# Apps and window actions
bindd = $mainMod, RETURN, Open terminal, exec, $terminal
bindd = $mainMod, SPACE, Open application launcher, exec, $applauncher
bindd = $mainMod, E, Open file manager, exec, $filemanager
bindd = $mainMod, Q, Close active window, killactive
bindd = $mainMod, F, Toggle fullscreen, fullscreen
bindd = $mainMod, V, Toggle floating, togglefloating
bindd = $mainMod, L, Lock screen, exec, swaylock -f
bindd = $mainMod, O, Reload Waybar, exec, pkill -SIGUSR2 waybar
bindd = $mainMod, mouse:272, Move active window, movewindow
bindm = $mainMod, mouse:273, Resize active window, resizewindow

# Screenshots
bindd = , Print, Copy region screenshot, exec, $shot_region
bindd = CTRL, Print, Copy active window screenshot, exec, $shot_window
bindd = ALT, Print, Copy display screenshot, exec, $shot_screen

# Focus and move windows
bindd = $mainMod, left, Focus left, movefocus, l
bindd = $mainMod, right, Focus right, movefocus, r
bindd = $mainMod, up, Focus up, movefocus, u
bindd = $mainMod, down, Focus down, movefocus, d
bindd = $mainMod SHIFT, left, Move window left, movewindow, l
bindd = $mainMod SHIFT, right, Move window right, movewindow, r
bindd = $mainMod SHIFT, up, Move window up, movewindow, u
bindd = $mainMod SHIFT, down, Move window down, movewindow, d

# Workspaces. Super+scroll is intentionally a first-class binding.
bindd = $mainMod, 1, Switch to workspace 1, workspace, 1
bindd = $mainMod, 2, Switch to workspace 2, workspace, 2
bindd = $mainMod, 3, Switch to workspace 3, workspace, 3
bindd = $mainMod, 4, Switch to workspace 4, workspace, 4
bindd = $mainMod, 5, Switch to workspace 5, workspace, 5
bindd = $mainMod, 6, Switch to workspace 6, workspace, 6
bindd = $mainMod, 7, Switch to workspace 7, workspace, 7
bindd = $mainMod, 8, Switch to workspace 8, workspace, 8
bindd = $mainMod, 9, Switch to workspace 9, workspace, 9
bindd = $mainMod, 0, Switch to workspace 10, workspace, 10
bindd = $mainMod SHIFT, 1, Move window to workspace 1, movetoworkspacesilent, 1
bindd = $mainMod SHIFT, 2, Move window to workspace 2, movetoworkspacesilent, 2
bindd = $mainMod SHIFT, 3, Move window to workspace 3, movetoworkspacesilent, 3
bindd = $mainMod SHIFT, 4, Move window to workspace 4, movetoworkspacesilent, 4
bindd = $mainMod SHIFT, 5, Move window to workspace 5, movetoworkspacesilent, 5
bindd = $mainMod SHIFT, 6, Move window to workspace 6, movetoworkspacesilent, 6
bindd = $mainMod SHIFT, 7, Move window to workspace 7, movetoworkspacesilent, 7
bindd = $mainMod SHIFT, 8, Move window to workspace 8, movetoworkspacesilent, 8
bindd = $mainMod SHIFT, 9, Move window to workspace 9, movetoworkspacesilent, 9
bindd = $mainMod SHIFT, 0, Move window to workspace 10, movetoworkspacesilent, 10
bindd = $mainMod, mouse_down, Next workspace, workspace, e+1
bindd = $mainMod, mouse_up, Previous workspace, workspace, e-1

binds {
    allow_workspace_cycles = true
    workspace_back_and_forth = true
    workspace_center_on = 1
}

